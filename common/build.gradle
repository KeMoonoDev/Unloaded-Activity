
unimined.minecraft {
    fabric {
        loader fabric_loader_version
        if (minecraft_version.startsWith("1.")) {
            accessWidener = file("src/main/resources/${rootProject.archives_name}named.classtweaker")
        } else {
            accessWidener = file("src/main/resources/${rootProject.archives_name}official.classtweaker")
        }
    }

    defaultRemapJar = false
    runs.off = true
}